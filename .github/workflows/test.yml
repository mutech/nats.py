name: test

on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"

permissions:
    contents: read

env:
    # No nats-server releases exist for the UDS fork yet, so build it from
    # source and run every job against it (this also surfaces any TCP
    # regression from the UDS changes, not just UDS-specific behaviour).
    NATS_SERVER_FORK_REPO: https://github.com/mutech/nats-server.git
    NATS_SERVER_FORK_REF: main

jobs:
    nats:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
                nats-server-version: ["latest"]

        steps:
            - name: Check out repository
              uses: actions/checkout@v5

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "stable"

            - name: Build NATS Server (UDS fork)
              run: |
                  git clone --depth 1 --branch "$NATS_SERVER_FORK_REF" "$NATS_SERVER_FORK_REPO" "$RUNNER_TEMP/nats-server-fork"
                  go -C "$RUNNER_TEMP/nats-server-fork" install .
              shell: bash

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Install dependencies and project
              run: uv sync --dev

            - name: Run tests
              run: |
                  uv run pytest -x -vv -s --continue-on-collection-errors ./nats/tests

    project:
        name: ${{ matrix.project }} (python-${{ matrix.python-version }}, nats-server-${{ matrix.nats-server-version }}, ${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                python-version: ["3.13"]
                os: ["ubuntu-latest", "macos-latest", "windows-latest"]
                nats-server-version: ["latest"]
                project: ["nats-server", "nats-core", "nats-key-value"]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "stable"

            - name: Build NATS Server (UDS fork)
              run: |
                  git clone --depth 1 --branch "$NATS_SERVER_FORK_REF" "$NATS_SERVER_FORK_REPO" "$RUNNER_TEMP/nats-server-fork"
                  go -C "$RUNNER_TEMP/nats-server-fork" install .
              shell: bash

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Install dependencies
              run: uv sync --dev
              working-directory: ${{ matrix.project }}

            - name: Run tests for ${{ matrix.project }}
              run: uv run pytest -v -n auto
              working-directory: ${{ matrix.project }}
